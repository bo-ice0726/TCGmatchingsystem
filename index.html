<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>マッチングアプリ</title>
  <style>
    body { font-family: sans-serif; line-height: 1.6; }
    button { margin-left: 8px; }
    .match-item { margin-bottom: 16px; }
    .status { margin-top: 8px; color: #333; }
  </style>
</head>
<body>

<h1>大会参加</h1>

<input id="nameInput" placeholder="名前">
<button onclick="addPlayer()">参加</button>

<h2>参加者一覧</h2>
<ul id="playerList"></ul>

<h2>ランキング</h2>
<ul id="rankingList"></ul>

<label for="modeSelect">方式:</label>
<select id="modeSelect">
  <option value="tournament">トーナメント</option>
  <option value="swiss">スイスドロー</option>
</select>

<button onclick="createMatches()">マッチング開始</button>

<div id="roundInfo" style="margin-top: 16px; font-weight: bold;"></div>

<h2>マッチング結果</h2>
<div id="matchList"></div>

<script src="script.js"></script>
</body>
</html>
