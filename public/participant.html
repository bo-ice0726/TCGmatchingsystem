<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>大会参加 - TCGマッチングシステム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #0066cc; margin-bottom: 10px; }
    .tournament-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
    .info-item { background: #f0f8ff; padding: 12px; border-radius: 4px; }
    .info-item label { font-weight: bold; color: #0066cc; }
    .info-item p { color: #333; margin-top: 5px; }
    .main { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .panel h2 { color: #0066cc; margin-bottom: 15px; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
    button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0052a3; }
    .join-form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .join-form h2 { color: #0066cc; margin-bottom: 20px; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    input[type="text"]::placeholder { color: #999; }
    .btn-join { width: 100%; margin-top: 15px; padding: 12px; }
    .matched-view { display: none; }
    .matched-view.active { display: block; }
    .match-info { background: #f9f9f9; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
    .match-number { font-size: 24px; font-weight: bold; color: #0066cc; margin-bottom: 10px; }
    .opponent { font-size: 18px; margin: 10px 0; }
    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .btn-action { flex: 1; min-width: 200px; padding: 12px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #f9f9f9; padding: 15px; border-radius: 4px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #0066cc; }
    .stat-label { color: #666; margin-top: 5px; }
    .back-btn { background: #6c757d; margin-bottom: 20px; }
    .back-btn:hover { background: #5a6268; }
    .message { padding: 12px; border-radius: 4px; margin-bottom: 15px; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    @media (max-width: 1024px) {
      .tournament-info { grid-template-columns: repeat(2, 1fr); }
      .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .container { padding: 10px; }
      .tournament-info { grid-template-columns: 1fr; }
      header { padding: 15px; }
      .panel { padding: 15px; }
      button, input, select { font-size: 14px; }
      .action-buttons { flex-direction: column; }
      .btn-action { width: 100%; }
    }
    @media (max-width: 480px) {
      html { font-size: 14px; }
      h1 { font-size: 1.3rem; }
      .join-form, .panel { padding: 12px; }
      input[type="text"] { font-size: 16px; }
      .stat-value { font-size: 20px; }
      button { padding: 10px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="container">
  <button onclick="window.location.href='index.html'" class="back-btn">← ホームに戻る</button>

  <!-- 参加前 -->
  <div id="joinSection" class="join-form">
    <h2>大会に参加</h2>
    <input id="playerName" type="text" placeholder="あなたの名前を入力してください">
    <button onclick="joinTournament()" class="btn-join">参加する</button>
    <div id="joinMessage"></div>
  </div>

  <!-- 参加後 -->
  <div id="participateSection" style="display:none;">
    <header>
      <h1 id="tournamentNameDisplay"></h1>
      <div class="tournament-info">
        <div class="info-item">
          <label>あなた</label>
          <p id="playerNameDisplay"></p>
        </div>
        <div class="info-item">
          <label>ステータス</label>
          <p id="statusDisplay"></p>
        </div>
        <div class="info-item">
          <label>現在ラウンド</label>
          <p id="roundDisplay"></p>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="panel">
        <h2>📊 成績</h2>
        <div class="stats">
          <div class="stat-card">
            <div class="stat-value" id="winCount">0</div>
            <div class="stat-label">勝利数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="lossCount">0</div>
            <div class="stat-label">敗北数</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>🎮 マッチング</h2>
        <div id="matchingInfo"></div>
        <div class="action-buttons" id="matchActions"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="participant.js"></script>
</body>
</html>
